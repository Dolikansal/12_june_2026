<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>coding</title>

    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === 'p') {
          var pairs = l.search.slice(1).split('&');
          var query = pairs[0].split('=')[1].replace(/~and~/g, '&');
          if (query) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, l.pathname.lastIndexOf('/')) + '/' + query +
              (pairs[1] ? '?' + pairs[1].replace(/~and~/g, '&') : '') +
              l.hash
            );
          }
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script> 
  </body>
</html>
